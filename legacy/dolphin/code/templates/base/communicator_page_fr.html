<div class="communicator_fr_container bx-def-bc-margin">
    <bx_repeat:rows>
       
       
       
        <!-- freddy modif
        <div class="sys-connections-fr bx-def-margin-sec-top">
        -->
        <div class="sys-connections-fr bx-def-margin-sec-top-mutshi">
       
       
            <div class="sys-cntsfr-author-icon">
                __member_icon__
            </div>
            <div class="sys-cntsfr-info">
               
               
               
                <!-- freddy modif
                <div class="sys-cntsfr-author-info">__member_location__</div>
                -->
                 <div class="titre-prof-friend-request sys-cntsfr-author-info"> <b>__member_location__</b></div>
                 
                 
                  <!-- freddy ajout ----->
                   <bx_if:member_status> 
		   	               <div class="titre-prof-friend-request"> <i class="sys-icon briefcase"></i> __member_status__ </div>
		            </bx_if:member_status>
                  
                  
                
                 <div class="bx-def-font-small bx-def-font-grayed"> __member_flag__ __member_city__ , __member_pays__</div>
               <!--- Fin freddy ajout -->
               
               
               <!-- freddy modif 
                <div class="bx-def-font-small bx-def-font-grayed">__member_mutual_friends__</div>
                -->
                <div class="bx-def-font-small bx-def-font-grayed" style="font-size:10px;"><i class="sys-icon users"></i> __member_mutual_friends__</div>
                
                <div class="sys-cntsfr-actions">
                    <button class="ConnectFriendMutshi" onclick="javascript: if(typeof __js_object__ != 'undefined') __js_object__.sendAction(this, 'communicator_fr_container', 'accept_friends_request', 'getProcessingRows', __row_value__, false)">
                        <bx_text:_sys_cnts_btn_fr_accept />
                    </button>
                    <button class="RejetFriendMutshi" onclick="javascript: if(typeof __js_object__ != 'undefined') __js_object__.sendAction(this, 'communicator_fr_container', 'reject_friends_request', 'getProcessingRows', __row_value__)">
                        <bx_text:_sys_cnts_btn_fr_reject />
                    </button>
                    <div class="clear_both"></div>
                </div>
            </div>
        </div>
    </bx_repeat:rows>
</div>
__page_pagination__
