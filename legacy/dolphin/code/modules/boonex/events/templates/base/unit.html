<div itemscope="itemscope" itemtype="http://schema.org/Event" class="bx-twig-unit bx_events_unit bx-def-margin-top-auto">

   
    <div class="bx-twig-unit-tittre-fred">
            <a itemprop="url" href="__event_url__"><span itemprop="name"><i class="sys-icon calendar"></i> __event_title__</span></a>
        </div>
   
    <div class="bx-twig-unit-thumb-cont bx-def-margin-sec-right">
        <a href="__event_url__"><img itemprop="image" class="bx-twig-unit-thumb bx-def-round-corners bx-def-shadow" src="__thumb_url__"></a>
    </div>

    <div class="bx-twig-unit-info">
    
     <div class="CSSProfessionalUnit" >
    <table >
                    <tr>
                       
                        <td >

       
        <div class="infoUnit infoUnitFontIcon  bx-twig-unit-line bx-def-font-small bx-def-font-grayed">
          <span style="font-size:14px;"> <i class="sys-icon calendar"></i> &nbsp; Date: __start_date__</span>
        </div>
        
        <div class="bx-twig-unit-line bx-twig-unit-special">
         <span style="font-size:14px;"> <i class="sys-icon calendar-check-o"> &nbsp;</i> __event_start__<span itemprop="startDate" content="__event_start_rsnippet__"></span></span>
         </div>
         
         
           <div itemprop="location" class="bx-twig-unit-line">
               <strong> <i class="sys-icon building"> &nbsp;</i> __country_city__</strong>
               
        </div> 
           
 
		<!-- [begin] location integration modzzz  -->
		<bx_if:location_event>
			<div class="bx-twig-unit-line bx-twig-unit-special"> 
				<bx_text:_modzzz_location_caption_event_for_location /> __location__
			</div> 
		</bx_if:location_event>
		<!-- [end] location integration modzzz  -->

		<!-- [begin] band integration modzzz  -->
		<bx_if:band_event>
			<div class="bx-twig-unit-line bx-twig-unit-special"> 
				<bx_text:_modzzz_bands_caption_event_for_band /> __band__
			</div> 
		</bx_if:band_event>
		<!-- [end] band integration modzzz  -->		

		<!-- [begin] club integration modzzz  -->
		<bx_if:club_event>
			<div class="bx-twig-unit-line bx-twig-unit-special"> 
				<bx_text:_modzzz_club_caption_event_for_club /> __club__
			</div> 
		</bx_if:club_event>
		<!-- [end] club integration modzzz  -->
 
		<!-- [begin] school integration modzzz  -->
		<bx_if:school_event>
			<div class="bx-twig-unit-line bx-twig-unit-special"> 
				<bx_text:_modzzz_schools_caption_event_for_school /> __school__
			</div> 
		</bx_if:school_event>
		<!-- [end] school integration modzzz  -->
        
       
         </td>
                       
          </tr>
          <tr>
          <td > 
                        
 
         <div  class="bx-twig-unit-line bx-twig-unit-desc bx-twig-unit-line bx-def-font-small bx-def-font-grayed">
        __snippet_text__
        </div>
         </td>
                       
          </tr>     
      
       
           <tr>
           <td > 
        
        
           <button class="EnSavoirPLus"   onclick="window.open ('__event_url__','_self');">
						<i class="sys-icon calendar"> &nbsp;</i><strong><bx_text:_bx_events_caption_ensavoirplus />  </strong>
					</button>    
              
           <div class="masque_projet_contenu">   
              <div class="bx-twig-unit-line bx-def-font-small bx-def-font-grayed">
                <i class="sys-icon users "></i> __participants__  
                 <br><i class="sys-icon eye "></i> __views_count__ 
             </div>
          </div> 
                 
         

      

       

         <bx_if:full>
            <div class="bx-twig-unit-line bx-def-font-small bx-def-font-grayed">
                <bx_text:_bx_events_by_author /> <a href="__author_url__">__author__</a>  |   <a class="BoutonJoCompanybUnit" href="__company_event_url__"> <i class="sys-icon briefcase"></i> <strong>__company_event__</strong></a>
            </div>   
        </bx_if:full>
        
         </td>
                    </tr>
                      
                    
              
                   
                       
                </table>
                 </div>  
    <div class="clear_both"></div>

    </div>    

</div>
