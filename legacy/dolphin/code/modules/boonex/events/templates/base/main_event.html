<div class="bx-def-bc-padding">
   
   
    <bx_if:image>
    <div class="bx_events_main_photo bx-def-margin-sec-bottom">
        <a title="__image_title__" href="__event_url__"><img class="bx-def-shadow bx-def-round-corners" alt="__image_title__" src="__image_url__" /></a>
    </div>
    </bx_if:image>
    
    
    
    <div class="bx_events_main_info">
      
        <div class="bx_events_main_info_title bx-def-font-h2">
            <a href="__event_url__"><i class="sys-icon calendar"> &nbsp;</i> __event_title__</a> 
        </div>
        
        <div class="bx_events_main_info_text">
           
          
             <div class="bx-twig-unit-line bx-twig-unit-special">
           <span style="font-size:20px;"> <strong> <i class="sys-icon calendar-check-o"> &nbsp;</i></strong></span>
             __event_start_in__
          </div>
          
          
           <div itemprop="location" class="bx-twig-unit-line">
                <i class="sys-icon building"> &nbsp;</i> __country_city__
                
        </div>
          
          
           <div style="margin-top:15px;">  
         <button class="EnSavoirPLus"   onclick="window.open ('__event_url__','_self');">
		<i class="sys-icon calendar"> &nbsp;</i><strong><bx_text:_bx_events_caption_ensavoirplus /> &nbsp; <i class="sys-icon hand-o-left"> </i> </strong>
		</button>   
        </div> 
            
       
          
           
       <br>  <span class="bx-def-font-small bx-def-font-grayed">__author_title__ <a href="__author_url__">__author_username__</a></span>  |   <a class="BoutonJoCompanybUnit" href="__company_event_url__"> <i class="sys-icon briefcase"></i> <strong>__company_event__</strong></a>
        </div>
        
        <!-- [begin] group integration modzzz  -->
		<bx_if:group_event>
			<div class="bx-twig-unit-line bx-twig-unit-special"> 
				<bx_text:_bx_events_caption_event_for_group /> __group__
			</div> 
		</bx_if:group_event>
		<!-- [end] group integration modzzz  -->
        
        
        <div class="bx_events_main_info_img">
            __rating__ 
           
            <div class="clear_both"></div>
           
            <div class="bx_events_unit_participants"><i class="sys-icon user bx-def-font-grayed"></i><b>__participants__</b></div>
        </div>        
       
        <div class="clear_both"></div>
    </div>
</div>
