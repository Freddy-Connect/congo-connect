<div class="mbp-available-levels">
    <bx_repeat:levels>
        <div class="mbp-level">  
            <div class="mbp-level-content">
                <div class="mbp-level-title">
                    __title__ (__days__ - __currency_sign____price__)
                </div>                
                <div class="mbp-level-info">__description__</div> 
				<div class="mbp-cb">&nbsp;</div> 
				<br>
				<div class="mbp-level-info"><b> <i class="sys-icon star"> </i> <bx_text:_bx_events_featured /></b> - __featured__</div> 
                <div class="mbp-level-info"><b><i class="sys-icon file-pdf-o"> </i> <bx_text:_bx_events_allow_files /></b> - __files__</div> 
             </div>
                <div class="mbp-level-info"><b> <i class="sys-icon camera"> </i> <bx_text:_bx_events_allow_photos /></b> - __photos__</div> 
				<div class="mbp-level-info"><b> <i class="sys-icon youtube-square"> </i> <bx_text:_bx_events_allow_videos /></b> - __videos__</div> 
				
				<!-- 
                <div class="mbp-level-info"><b><bx_text:_bx_events_allow_sounds /></b> - __sounds__</div> 
                -->
				
        </div>
        <div class="mbp-border">&nbsp;</div>
    </bx_repeat:levels>
</div>
