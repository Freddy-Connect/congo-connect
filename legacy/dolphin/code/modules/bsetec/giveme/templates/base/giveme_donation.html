<script type="text/javascript">

$('.save_donation').on('click',function(){
    var flage = $('.flag-donation').val();
    if(flage!=1){
        return false;
    }else{
        return true;
    }
});


function checkAmount(){
   var amount = $('#goal_amount').val();
        var res = $.isNumeric(amount)
        if(res==false){
            $('#err_goal_amount').html('Enter Numeric Value');
            $('.flag-donation').val('0');
        }
        else{
            $('.flag-donation').val('1');
            $('#err_goal_amount').html('');
        }  
}

    $('#goal_amount').on('blur',function(){
       checkAmount();
    });

    $(window).load(function(){
        checkAmount();
    });

	$(document).ready(function(){


        $('.reset_donation').click(function(){
         var v=confirm('Are you sure to reset Donation data? All the Donation data will be removed permanently ');

           if(v==true){

              $.ajax({
                       type:'post',
                       url:'__url__?r=giveme/Resetdonorist',
                       success:function(data){

                        location.reload(); 
                       }
                });
             } 

       });
        
		$('#goal_reached').prop('checked','__goal_reached__');
		$('#donation_status').prop('checked','__donation_status__');
	});

      var table = $('#Donorlist').dataTable({
                "ordering": false,
                "processing": true,
                "serverSide": true,
                "ajax":{

                    type: "post",
                    error: function(){

                       $('#Donorlist').html('<tbody class="donor-list-error"><tr><th colspan="3">No data found in the server</th></tr></tbody>');
                    }
                },
