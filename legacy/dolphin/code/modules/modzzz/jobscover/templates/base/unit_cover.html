<div class="sys-profile-cover bx-def-margin-top bx-def-border bx-def-round-corners">
	<div class="sys-profile-cover-bg-l1__background_class__"<bx_if:show_background> style="background-image: url(__background__)"</bx_if:show_background>></div>
	<div class="sys-profile-cover-bg-l2"></div>
	<bx_if:show_actions>
		<div class="sys-profile-cover-actions bx-def-padding">
 
			<!-- Clickable Nav -->
			<div class="click-nav">
				<ul class="no-js">
					<li>
						<a class="clicker"><span class="sys-pca-text"><i class="sys-icon picture-o sys-pca-icon"></i> <bx_text:_modzzz_jobscover_manage_cover /></span></a>
						<ul>
							<li><a class="" href="__href_cover_change__"><span class=""><i class="sys-icon crosshairs sys-pca-icon"></i> <bx_text:_sys_btn_cover_change /></span></a></li> 
							<li><a class="" href="__href_cover_add__"><span class=""><i class="sys-icon plus sys-pca-icon"></i> <bx_text:_modzzz_jobscover_add_cover /></span></a></li> 
							<li><a class="" href="__href_cover_delete__"><span class=""><i class="sys-icon remove sys-pca-icon"></i> <bx_text:_modzzz_jobscover_remove_cover /></span></a></li> 
						</ul>
					</li>
				</ul>
			</div>
			<!-- /Clickable Nav -->
			 
			<!--
			<a class="bx-btn bx-btn-small sys-pca-change-background" href="__href_upload__" title="<bx_text_attribute:_sys_btn_cover_change />"><i class="sys-icon picture-o sys-pca-icon"></i><span class="sys-pca-text"><bx_text:_sys_btn_cover_change /></span></a>
			-->
		</div>
	</bx_if:show_actions>
	<div class="sys-profile-cover-cnt">
		<div class="sys-profile-cover-thumbnail">
			<bx_if:show_thumbnail_image>
				<img class="sys-pct-image" src="__thumbnail__" />
			</bx_if:show_thumbnail_image> 

			<bx_if:show_profile_image>
				<a class="sys-pct-link" href="__thumbnail_href__">
					<img class="sys-pct-image" src="__thumbnail__" src-2x="__thumbnail2x__" />
				</a>
			</bx_if:show_profile_image>

			<bx_if:show_thumbnail_letter_text>
				<a class="sys-pct-link" href="__thumbnail_href__">
					<p class="sys-pct-letter">__letter__</p>
				</a>
			</bx_if:show_thumbnail_letter_text>  
		</div>
		<div class="sys-profile-cover-text">
			<div class="sys-profile-cover-text-cnt">
				<h1 class="sys-pct-nickname bx-def-font-h1">__title__</h1>
				<p class="sys-pct-status bx-def-padding-sec-top"><bx_text:_modzzz_jobscover_by /> <a class="sys-pct-link" href="__nicklink__">__nickname__</a></p>
			</div>
		</div>
		<div class="sys-profile-cover-menu">
			<div class="sys-profile-cover-menu-cnt">
				<bx_repeat:menu_items>
					<a class="sys-pcm-item bx-def-margin-left-auto" href="__href__"<bx_if:show_onclick> onclick="__onclick__"</bx_if:show_onclick><bx_if:show_target> target="__target__"</bx_if:show_target>>__caption__</a>
				</bx_repeat:menu_items>
			</div>
		</div>
	</div>
</div>

 
<!-- jQuery -->
<script>
$(function() {
	// Clickable Dropdown
	$('.click-nav > ul').toggleClass('no-js js');
	$('.click-nav .js ul').hide();
	$('.click-nav .js').click(function(e) {
		$('.click-nav .js ul').slideToggle(200);
		$('.clicker').toggleClass('active');
		e.stopPropagation();
	});
	$(document).click(function() {
		if ($('.click-nav .js ul').is(':visible')) {
			$('.click-nav .js ul', this).slideUp();
			$('.clicker').removeClass('active');
		}
	});
});
</script>

<style>
.click-nav {
	margin:10px auto;
	width:200px;
}
.click-nav ul {
	font-weight:900;
}
.click-nav ul li {
	position:relative;
	list-style:none;
	cursor:pointer;
}
.click-nav ul li ul {
	position:absolute;
	left:0;
	right:0;
	margin:0px auto;
	padding:0;
	width:160px;
}
.click-nav ul .clicker {
	background:#2284B5;
	color:#FFF;
}
.click-nav ul .clicker:hover,
.click-nav ul .active {
	background:#196F9A;
}
.click-nav img {
	position:absolute;
	top:9px;
	left:12px;
}
.click-nav ul li a {
	transition:background-color 0.2s ease-in-out;
	-webkit-transition:background-color 0.2s ease-in-out;
	-moz-transition:background-color 0.2s ease-in-out;
	display:block;
	padding:8px 10px 8px 20px;
	background:#FFF;
	color:#333;
	text-decoration:none;
}
.click-nav ul li a:hover {
	background:#F2F2F2;
}
/* Fallbacks */
.click-nav .no-js ul {
	display:none;
}
.click-nav .no-js:hover ul {
	display:block;
}
</style>
