<script>
	function setTitleText(sText){
		if(document.getElementById('etext').value == "")
			document.getElementById('etext').value = sText; 
	}

	function emptyTitleText(sText){
		if(document.getElementById('etext').value == sText)
			document.getElementById('etext').value = ""; 
	}
</script>

<form name='createfrm' method=post action='__create_url__'>
	<div class="bx-def-bc-padding">
		<div style="float:left"> 
			  <textarea id="etext" name="title" style='height:25px' cols=30 onblur="setTitleText('<bx_text:_modzzz_investment_enter_your_investment />')" onfocus="emptyTitleText('<bx_text:_modzzz_investment_enter_your_investment />')"><bx_text:_modzzz_investment_enter_your_investment /></textarea>
		</div>
	   &nbsp;
		<div style="float:left"> 
			 <button class="bx-btn bx-btn-img bx-btn-small bx-btn-ifont" onclick="document.createfrm.submit()"> 
				<i class="sys-icon plus"></i>
				<bx_text:_modzzz_investment_continue />
			</button>  
		</div>
	  
		<div class="clear_both"></div>
   </div>
</form>
