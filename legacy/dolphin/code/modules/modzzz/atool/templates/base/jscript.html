<script src="http://code.jquery.com/ui/1.10.3/jquery-ui.js"></script>
 
<script>
$(function() {
 
$('#sortid').sortable({
    axis: 'y',
    stop: function (event, ui) {
        var data = $(this).sortable('serialize');

        // POST to server using $.post or $.ajax
        $.ajax({
            data: data,
            type: 'POST',
            url: '__url__'
        });
    }
});

$( "#sortid" ).disableSelection();

});  
</script>
