 <link href="//netdna.bootstrapcdn.com/font-awesome/4.1.0/css/font-awesome.min.css" rel="stylesheet">

 <div itemscope itemtype="https://schema.org/Organization" class="searchrow_block_simple bx-def-bc-padding">   

    
 <div class="bx-twig-unit-info">
 
 
 
<!-- ENTREPRISES – GRID + CARTE (responsive) -->
  
<section class="biz-section">
 

  <!-- Grille (fonctionne avec 1 ou plusieurs entreprises) -->
  <div class="biz-grid">
    <!-- CARTE ENTREPRISE -->
    <article class="biz-card">
      <div class="biz-top">
        <div class="biz-logo">
         <a href="__listing_url__">
          <img src="__thumb_url__" alt="Logo Entreprise">
          </a>
        </div>

        <div class="biz-head">
          <h3 class="biz-name"> <a itemprop="url" href="__listing_url__">
         <i class="sys-icon briefcase"></i> __listing_title__
          </a>
          </h3>
          <div class="biz-meta">
            <span class="biz-meta-item">__drapeau__ __country__</span>
            <span class="biz-dot">•</span>
            <span class="biz-meta-item"> <i class="sys-icon map-marker"></i> __city__</span>
          </div>
        </div>

        <span class="biz-badge"><i class="sys-icon cog"></i>  __all_categories__  
      
         </span>
      </div>

      <p class="biz-value">
       __snippet_text__
      </p>


      <div class="biz-stats">
        <div class="biz-stat">
         
          <span class="biz-stat-label">  <a href="__jobs_count_url__"> <i class="sys-icon black-tie"></i>  <span class="biz-stat-number">  __jobs_count__</span>  __Job_Single_Plural__  </a></span>
        </div>
        <div class="biz-stat">
         
          <span class="biz-stat-label"> <a href="__classified_count_url__"> <i class="sys-icon shopping-cart"></i> <span class="biz-stat-number">__classified_count__</span>  __classified_Single_Plural__  </a></span>
        </div>
        <div class="biz-stat">
         
          <span class="biz-stat-label"><a href="__events_count_url__">
           <i class="sys-icon calendar"></i>  <span class="biz-stat-number">__events_count__</span> __Event_Single_Plural__ </a></span>
        </div>
      </div>


<button class="biz-btn biz-btn-primary"   onclick="window.open ('__listing_url__','_self');">
		  <i class="sys-icon sign-out"> &nbsp;</i><strong><bx_text:_modzzz_listing_action_voir_entreprise />  </strong>
				</button>

      <div class="biz-actions">

		  <i class="sys-icon sign-out"> &nbsp;</i><strong><bx_text:_modzzz_listing_action_voir_entreprise />  </strong>
				</button>
        
        <a class="biz-btn biz-btn-ghost" href="__listing_url__"><bx_text:_modzzz_listing_action_en_savoir_plus /> </a>
      
   
      </div>
       --> 
      
      
    </article>
    <!-- /CARTE ENTREPRISE -->

    <!-- Duplique <article class="biz-card">...</article> pour chaque entreprise -->
  </div>
</section>


        <div class="clear_both"></div>
        
        

    </div>    

</div>
