<link href="//netdna.bootstrapcdn.com/font-awesome/4.1.0/css/font-awesome.min.css" rel="stylesheet">

<div class="mbp-available-levels">
    <bx_repeat:levels>
        <div class="mbp-level">  
            <div class="mbp-level-content">
                <div class="mbp-level-title">
                   <!-- freddy modif   __title__ (__days__ - __currency_sign____price__) -->
                    <i class="sys-icon briefcase"></i>  __title__
                    <br /> <i class="fa fa-calendar"></i> <bx_text:_modzzz_formations_allow_duree />: __days__
                    <br /> <i class="fa fa-building"></i> <bx_text:_modzzz_formations_allow_prix />: __currency_sign____price__
                </div>                
                <div class="mbp-level-info">__description__</div> 
				<!-- freddy comment 
                <div class="mbp-cb">&nbsp;</div> 
				
				
                <div class="mbp-level-info"><b><bx_text:_modzzz_formations_featured /></b> - __featured__</div> 
                -->
				<div class="mbp-level-info"><i class="sys-icon camera"></i> <span style="font-size:12px;"><bx_text:_modzzz_formations_allow_photos /> - __photos__</span></div> 
                <div><i class="sys-icon film"></i> <span style="font-size:12px;"><bx_text:_modzzz_formations_allow_videos /> - __videos__</span></div> 
				
				<!-- freddy comment 
                <div class="mbp-level-info"><b><bx_text:_modzzz_formations_allow_sounds /></b> - __sounds__</div> 
                -->
				<div><i class="sys-icon file-pdf-o"></i> <span style="font-size:12px;"><bx_text:_modzzz_formations_allow_files /> - __files__</span></div> 
             </div>
        </div>
        <div class="mbp-border">&nbsp;</div>
    </bx_repeat:levels>
</div>
