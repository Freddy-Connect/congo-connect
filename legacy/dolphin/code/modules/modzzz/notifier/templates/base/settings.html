<form method=post name='notifierfrm' action='__action_url__'>
	<div class="bx-def-bc-padding">
		<div class='setting'><input type=radio value='none' name="setting" __none_selected__>&nbsp;<span class="setting_text"><bx_text:_modzzz_notifier_do_not_notifier_me /></div>
		<div class='setting'><input type=radio value='immediately' name='setting' __immediately_selected__>&nbsp;<span class="setting_text"><bx_text:_modzzz_notifier_notifier_me_immediately /></span></div>
		<div class='setting'><input type=radio value='daily' name='setting' __daily_selected__>&nbsp;<span class="setting_text"><bx_text:_modzzz_notifier_notifier_me_daily /></span></div>
		<div class='setting'><input type=radio value='weekly' name='setting' __weekly_selected__>&nbsp;<span class="setting_text"><bx_text:_modzzz_notifier_notifier_me_weekly /></span></div>
		<div class='setting'><input type=radio value='monthly' name='setting' __monthly_selected__>&nbsp;<span class="setting_text"><bx_text:_modzzz_notifier_notifier_me_monthly /></span></div> 

		<div style='text-align:center' > 
			<button class="bx-btn bx-btn-small bx-btn-img bx-btn-ifont" onclick="this.notifierfrm.submit();">
				<i class="sys-icon save"></i>
				<bx_text:_modzzz_notifier_save />
			</button>   	
		</div> 
		<div class="clear_both"></div> 
	</div> 
	<div class="clear_both"></div> 
</form>
