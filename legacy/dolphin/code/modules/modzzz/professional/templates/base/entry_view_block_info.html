<div class="bx_sys_block_info">
    <div class="infoMain">
 
            __author_thumb__
       
        <div class="infoText bx-def-margin-sec-top">
            <div class="infoUnit infoUnitFontIcon">
                <i class="sys-icon bell"></i>
                __date__ (__date_ago__)
            </div>
  
			<bx_if:owner>
				<div class="infoUnit infoUnitFontIcon">        
					<i class="sys-icon lock"></i>
					<bx_text:_modzzz_professional_expires />: __expire__
				</div>
				<div class="infoUnit infoUnitFontIcon">        
					<i class="sys-icon star-empty"></i>
					 __featured__
				</div> 
			</bx_if:owner>
        </div>
        <div class="clear_both"></div>
    </div>
</div>
 
<bx_if:online_presence>
	__online_presence__
</bx_if:online_presence>
