<script>
function setTitleText(sText){
	if(document.getElementById('etext').value == "")
		document.getElementById('etext').value = sText; 
}

function emptyTitleText(sText){
	if(document.getElementById('etext').value == sText)
		document.getElementById('etext').value = ""; 
}
</script>

<form name='createfrm' method=post action='__create_url__'>
	<div class="bx-def-bc-padding">
		<div style='text-align:left'>
			 <textarea id="etext" name="title" style='height:25px' cols=30 onblur="setTitleText('<bx_text:_modzzz_charity_enter_your_charity />')" onfocus="emptyTitleText('<bx_text:_modzzz_charity_enter_your_charity />')"><bx_text:_modzzz_charity_enter_your_charity /></textarea> 
		</div>
		<div class="clear_both"></div>  
		<div style='text-align:left'> 
			 <button class="bx-btn bx-btn-img bx-btn-ifont" onclick="document.createfrm.submit()"> 
				<i class="sys-icon search"></i>
				<bx_text:_modzzz_charity_continue />
			</button>  
		</div> 
		<div class="clear_both"></div>  
	</div>
</form>
