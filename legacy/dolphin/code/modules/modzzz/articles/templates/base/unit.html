 <div class="bx-twig-unit modzzz_articles_unit bx-def-margin-top-auto">

    <div>
       <table>
         <tr>
         <td>
     <div class="bx-twig-unit-title bx-def-font-h1"> 
           <div><a href="__article_url__">  __article_title__</a></div>
       </div> 
        </td>
        </tr>
       </table>
    </div>
    
    
    
    
	<bx_if:showphoto>
		<div class="bx-twig-unit-thumb-cont bx-def-margin-sec-right">
			<a href="__article_url__"><img class="bx-twig-unit-thumb bx-def-round-corners bx-def-shadow" src="__thumb_url__"></a>
		</div>
	</bx_if:showphoto>

	<bx_if:showmember>
		<div class="bx-twig-unit-icon-cont bx-def-margin-sec-right">
			__post_uthumb__
		</div>
	</bx_if:showmember>
    

   <div class="bx-twig-unit-info">

      

    <div class="CSSProfessionalUnit">
       <table>
         <tr>
         <td>  
          <bx_if:full>

            <div class="bx-twig-unit-line bx-twig-unit-rate">
                __rate__
            </div>

             <div class="bx-twig-unit-line bx-def-font-small bx-def-font-grayed">
                <i class="sys-icon user"></i>  <a href="__author_url__">__author__</a> | <i class="sys-icon clock-o"></i>  __created__ <span class="bullet">&#183;</span>
            </div>
        </bx_if:full>
    
         </td>
        </tr>
         <tr>
         <td> 
     <div class="bx-twig-unit-line bx-def-font-small bx-def-font-grayed">
			<i class="sys-icon cog"></i> <a href="__category_url__">__category_name__</a><bx_if:subcategory>&nbsp;<span class="bullet">&#8594;</span> <a href="__subcategory_url__">__subcategory_name__</a></bx_if:subcategory>
		</div>
     
      </td>
        </tr>
         <tr>
         <td> 
 
         <div class="bx-twig-unit-line bx-twig-unit-desc">__snippet_text__</div>
        
        
        
         </td>
        </tr>
         <tr>
         <td> 
               <div style="font-size:16px; font-weight:600;">          
                <button class="ConnectNetwork_MarginTop"   onclick="window.open ('__article_url__','_self');">
		          <i class="sys-icon sign-out"> &nbsp;</i><strong><bx_text:_modzzz_listing_action_en_savoir_plus />  </strong>
				</button>
             </div>
       
         </td>
        </tr>
       </table>
    </div>
    <div class="clear_both"></div>
       

    </div>
