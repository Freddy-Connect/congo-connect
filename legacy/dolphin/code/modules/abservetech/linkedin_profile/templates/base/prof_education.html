<div class="edu_display_area __style__" data-div="edu_display_area">
<bx_repeat:edus>
<div class="each_container" data-eduid="__edu_id__">
	
		<div class="absline edu_school_name">
			<span data_href="page_block_957" class="scroll_con_edit"><i class="sys-icon university"></i> <b>__school_name__</b></span>
		</div>
      
	<div class="absline edu_particular_info">
        
			
        <bx_if:type> 
		  <span data_href="page_block_957" class="scroll_con_edit"><span class="edu_type"><i class="sys-icon graduation-cap"></i> __type__</span>
       </bx_if:type>
            
         <bx_if:fieldofstudy> 
		   <br /><i class="sys-icon desktop"></i>	<span class="edu_fieldofstudy">__fieldofstudy__</span>
       </bx_if:fieldofstudy>
        <bx_if:grade> 
	        <span class="edu_grade"><i class="sys-icon certificate"></i> __grade__</span>
        </bx_if:grade>
         </span>
	</div>
		
        <bx_if:period> 
		   <div class="absline edu_period">
			  <span data_href="page_block_957" class="scroll_con_edit"><i class="sys-icon calendar"></i> __period__</span>
		   </div>
       </bx_if:period>
      
      <bx_if:activities> 
	    <div class="absline edu_activities">
			<span data_href="page_block_957" class="scroll_con_edit"><i class="sys-icon users"></i> __activities__</span>
		</div>
   </bx_if:activities>
       
     <bx_if:desc> 
	    <div class="absline edu_desc">
			<span data_href="page_block_957" class="scroll_con_edit"> <i class="sys-icon list-alt"></i> __desc__</span>
		</div>
   </bx_if:desc>
		
			
</div>
</bx_repeat:edus>
</div>
