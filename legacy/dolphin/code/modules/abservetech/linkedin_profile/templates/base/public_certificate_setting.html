<!-- <div class="certicates_display_area __style__" data-div="certicates_display_area"> -->
<div class="edu_display_area __style__" data-div="edu_display_area">
<bx_repeat:exps>
<div class="each_container" data-certid="__id__">
	<div class="exp_info hover_show hover_show_edit">
		<div class="absline cert_name">
			<span data_href="" class=""><i class="sys-icon certificate"></i> <b>__certificatename__</b></span>
		</div>
		
		 <!-- freddy change
		<div class="absline cert_authority">
			<span data_href="" class=""><i class="sys-icon building"></i> __certificateauthority__</span>
		</div>
        -->
         <bx_if:certificateauthority> 
		  <div class="absline cert_authority">
			<span data_href="" class=""><i class="sys-icon building"></i> <b><bx_text:_abs_plinkin_certificateurl_delivered_by />:</b>  __certificateauthority__</span>
		</div>
		</bx_if:certificateauthority>
        
        
         
        <!-- freddy change
         <div class="absline cert_license">
			<span data_href="" class=""><i class="sys-icon diamond"></i> N° __certificatelicense__</span>
		</div>
        -->
         <bx_if:certificatelicense> 
		   <div class="absline cert_license">
			<span data_href="" class=""><i class="sys-icon diamond"></i> N° __certificatelicense__</span>
		</div>
		</bx_if:certificatelicense>
        
        
         
            <div class="absline cert_period">

             <span data_href="" class=""><span class="from-to"><i class="sys-icon calendar"></i> __period__</span>
			</span>
            
            </div>
		<!-- freddy add certificate url-->
       
         <bx_if:certificateurl> 
		   <div class="absline cert_license">
		<span data_href="" class=""><a href="__certificateurl__" target="_blank"><i class="sys-icon link"></i> <b> <bx_text:_abs_plinkin_certificateurl_link /></b></a></span>
		</div>
		</bx_if:certificateurl>
        <!--------------------------------------------------------->
      
	</div>
    
</div>


</bx_repeat:exps>
</div>
